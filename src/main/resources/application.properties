spring.application.name=transfert-etudiant

server.port=${PORT:8080}

# PostgreSQL (Utilise la variable DATABASE_URL de Render en prod, ou localhost en local)
spring.datasource.url=${DATABASE_URL:jdbc:postgresql://localhost:5432/transfert_db}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA – ne PAS spécifier de dialecte (auto-détection)
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Configuration JWT (Lit les variables de Render, sinon prend tes clés par défaut)
jwt.secret=${JWT_SECRET:404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970}
jwt.expiration=${JWT_EXPIRATION:86400000}

# CORS (Prend l'URL finale de ton React sur Render, sinon localhost en local)
cors.allowed.origins=${REACT_APP_URL:http://localhost:1420}

# Logging
logging.level.com.transfert=DEBUG