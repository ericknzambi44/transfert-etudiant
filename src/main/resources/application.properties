# ===================================================================
# CONFIGURATION DE LA BASE DE DONNÉES (POSTGRESQL)
# ===================================================================
# Spring va chercher ces variables d'environnement. Si elles n'existent pas (en local),
# il utilisera les valeurs après le signe ":" (localhost:5432, postgres, etc.)
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/transfert_db}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:root}
spring.datasource.driver-class-name=org.postgresql.Driver

# ===================================================================
# CONFIGURATION HIBERNATE / JPA
# ===================================================================
spring.jpa.hibernate.ddl-auto=update
# Note: On ne spécifie pas le dialecte explicitement ici, Spring Boot 3+ le détecte automatiquement
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# ===================================================================
# CONFIGURATION DU PORT (CRUCIAL POUR RENDER)
# ===================================================================
# Render injecte automatiquement une variable d'environnement nommée PORT.
# Cette ligne ordonne à Tomcat d'écouter sur le port exigé par Render.
server.port=${PORT:8080}