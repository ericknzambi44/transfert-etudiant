spring.application.name=transfert-etudiant
server.port=8080

# H2 Database
spring.datasource.url=jdbc:h2:mem:transfertdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# JPA
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# JWT
jwt.secret=404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970
jwt.expiration=86400000

# CORS (pour React)
cors.allowed.origins=http://localhost:1420

# Logging
logging.level.com.transfert=DEBUG
logging.level.org.springframework=INFO